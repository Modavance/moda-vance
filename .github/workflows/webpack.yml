name: Publish
on:
  push:
    branches:
      - main
jobs:
  publish:
    name: 🚀 Build & Deploy Website
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get Latest Code
        uses: actions/checkout@v3

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📥 Install Dependencies
        run: npm ci
        working-directory: frontend

      - name: 🔨 Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: https://api.modavance.co

      - name: 📂 Sync Files
        uses: SamKirkland/web-deploy@v1
        with:
          target-server: ${{ secrets.host }}
          remote-user: ${{ secrets.username }}
          private-ssh-key: ${{ secrets.ssh_key }}
          source-path: frontend/dist/
          destination-path: /home/admin/web/modavance.co/public/
          rsync-options: --archive --verbose --compress --human-readable --progress --exclude=.git* --exclude=.git/ --exclude=README.md --exclude=readme.md --exclude=.gitignore
