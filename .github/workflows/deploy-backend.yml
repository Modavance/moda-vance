name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to DigitalOcean via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.host }}
          username: ${{ secrets.username }}
          key: ${{ secrets.ssh_key }}
          script: |
            set -e
            cd /home/admin/web/modavance.co/app/modavance/backend

            echo "==> Pulling latest code..."
            git reset --hard HEAD
            git pull origin main

            echo "==> Installing dependencies..."
            npm install --ignore-scripts

            echo "==> Generating Prisma client..."
            npx prisma generate

            echo "==> Building..."
            npm run build

            echo "==> Seeding database..."
            npx prisma db seed

            echo "==> Reloading PM2..."
            pm2 reload modavance-api --update-env || pm2 restart modavance-api --update-env

            echo "==> Waiting for app to stabilize..."
            sleep 3
            pm2 show modavance-api

            echo "==> Nginx config:"
            cat /etc/nginx/sites-available/modavance.co || cat /etc/nginx/sites-available/default || echo "No nginx config found"

            echo "==> SSL certificates:"
            sudo certbot certificates 2>/dev/null || echo "certbot not available"

            echo "==> Test backend directly on port:"
            curl -s http://localhost:3000/api/health || curl -s http://localhost:5000/api/health || curl -s http://localhost:8080/api/health || echo "No response on common ports"

            echo "Deploy complete!"
