name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to DigitalOcean via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.host }}
          username: ${{ secrets.username }}
          key: ${{ secrets.ssh_key }}
          script: |
            set -e
            cd /home/admin/web/modavance.co/app/modavance/backend

            echo "==> Pulling latest code..."
            git reset --hard HEAD
            git pull origin main

            echo "==> Installing dependencies..."
            npm install --ignore-scripts

            echo "==> Generating Prisma client..."
            npx prisma generate

            echo "==> Building..."
            npm run build

            echo "==> Seeding database..."
            npx prisma db seed

            echo "==> Reloading PM2..."
            pm2 reload modavance-api --update-env || pm2 restart modavance-api --update-env

            echo "==> Waiting for app to stabilize..."
            sleep 3
            pm2 show modavance-api

            echo "==> Find nginx config:"
            find /etc/nginx /usr/local/hestia /home/admin/conf -name "*.conf" 2>/dev/null | grep -i "modavance\|nginx\|proxy" | head -20 || echo "No nginx config found"

            echo "==> .env file:"
            cat .env | grep -v PASSWORD | grep -v SECRET | grep -v KEY || echo "No .env"

            echo "==> Test all ports:"
            for port in 3000 4000 5000 8000 8080 8443; do
              result=$(curl -s --max-time 2 http://localhost:$port/api/health 2>/dev/null)
              if [ -n "$result" ]; then echo "PORT $port: $result"; fi
            done || true

            echo "==> PM2 error log:"
            tail -20 ~/.pm2/logs/modavance-api-error-0.log 2>/dev/null || echo "No error log"

            echo "Deploy complete!"
