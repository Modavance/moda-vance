name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to DigitalOcean via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.host }}
          username: ${{ secrets.username }}
          key: ${{ secrets.ssh_key }}
          script: |
            set -e
            cd /home/admin/web/modavance.co/app/modavance/backend

            echo "==> Pulling latest code..."
            git reset --hard HEAD
            git pull origin main

            echo "==> Installing dependencies..."
            npm install --ignore-scripts

            echo "==> Generating Prisma client..."
            npx prisma generate

            echo "==> Building..."
            npm run build

            echo "==> Seeding database..."
            npx prisma db seed

            echo "==> Fixing CORS - updating FRONTEND_URL in .env..."
            sed -i 's|FRONTEND_URL=.*|FRONTEND_URL="https://modavance.co"|' .env
            grep "FRONTEND_URL" .env

            echo "==> Reloading PM2..."
            pm2 reload modavance-api --update-env || pm2 restart modavance-api --update-env

            echo "==> Waiting for app to stabilize..."
            sleep 3

            echo "==> Health check on port 3001:"
            curl -s http://localhost:3001/api/health || echo "Health check failed"

            echo "Deploy complete!"
