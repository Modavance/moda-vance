name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to DigitalOcean via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.host }}
          username: ${{ secrets.username }}
          key: ${{ secrets.ssh_key }}
          script: |
            set -e
            cd /home/admin/web/modavance.co/app/modavance/backend

            echo "==> Pulling latest code..."
            git reset --hard HEAD
            git pull origin main

            echo "==> Installing dependencies..."
            npm install --ignore-scripts

            echo "==> Generating Prisma client..."
            npx prisma generate

            echo "==> Building..."
            npm run build

            echo "==> Seeding database..."
            npx prisma db seed

            echo "==> Reloading PM2..."
            pm2 reload modavance-api --update-env || pm2 restart modavance-api --update-env

            echo "==> Waiting for app to stabilize..."
            sleep 3
            pm2 show modavance-api

            echo "==> Nginx proxy_pass config:"
            grep -i "proxy_pass\|listen\|server_name" /home/admin/conf/web/modavance.co.nginx.conf 2>/dev/null || echo "Could not read nginx conf"

            echo "==> APP PORT from .env:"
            grep "^PORT" .env || echo "No PORT in .env"

            echo "==> Test port 3001 (app port):"
            curl -sv --max-time 5 http://localhost:3001/api/health 2>&1 | tail -20 || echo "Port 3001 no response"

            echo "==> PM2 error log:"
            tail -30 ~/.pm2/logs/modavance-api-error-0.log 2>/dev/null || echo "No error log"

            echo "==> PM2 out log:"
            tail -20 ~/.pm2/logs/modavance-api-out-0.log 2>/dev/null || echo "No out log"

            echo "Deploy complete!"
